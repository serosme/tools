name: release

on: workflow_dispatch

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json

      - name: install dependencies
        run: npm ci

      - name: build
        run: npm run build

      - name: compute hash
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $archive = Get-ChildItem -Path packages/tools-electron/release/*.zip |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if (-not $archive) {
            Write-Error "No zip archive found in packages/tools-electron/release/"
            exit 1
          }

          $version = Get-Date -Format "yyyyMMddHHmmss"
          $hash = (Get-FileHash -Algorithm SHA256 $archive.FullName).Hash.ToLower()

          "archive=$($archive.FullName)" >> $env:GITHUB_ENV
          "version=$version" >> $env:GITHUB_ENV
          "hash=$hash" >> $env:GITHUB_ENV

      - name: update manifest
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $m = "bucket/tools.json"
          $c = Get-Content $m -Raw
          $c = $c -replace '"version":\s*"[^"]*"', "`"version`": `"$env:version`""
          $c = $c -replace '"hash":\s*"[^"]*"', "`"hash`": `"$env:hash`""
          Set-Content $m $c -NoNewLine

          git config user.name "github-actions[bot]" --local
          git config user.email "github-actions[bot]@users.noreply.github.com" --local
          git add $m
          git commit -m "chore: update scoop manifest to $env:version"
          git push

      - name: reset latest tag
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = "Stop"

          $tag = "latest"

          gh release delete $tag --yes --cleanup-tag 2>$null
          git fetch --tags
          git push origin --delete $tag 2>$null
          git tag -d $tag 2>$null

          git tag $tag
          git push origin $tag
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Failed to push tag $tag"
            exit 1
          }

      - name: create release
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = "Stop"

          gh release create "latest" `
            --title "latest" `
            --notes "" `
            --repo "${{ github.repository }}" `
            "$env:archive"

          if ($LASTEXITCODE -ne 0) {
            Write-Error "Failed to create release"
            exit 1
          }
