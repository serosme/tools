name: release

on: workflow_dispatch

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json

      - run: npm ci

      - run: npm run build

      - shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = "Stop"

          $archive = Get-ChildItem -Path packages/tools-electron/release/*.zip |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if (-not $archive) {
            Write-Error "No zip archive found in packages/tools-electron/release/"
            exit 1
          }

          $releases = gh release list --limit 100 --json tagName | ConvertFrom-Json
          foreach ($r in $releases) {
            gh release delete $r.tagName --yes --cleanup-tag 2>$null
          }

          git fetch --tags
          $remoteTags = git ls-remote --tags origin | ForEach-Object { ($_ -split "\s+")[1] -replace "^refs/tags/", "" }
          foreach ($tag in $remoteTags) {
            git push origin --delete $tag 2>$null
          }

          git tag -l | ForEach-Object { git tag -d $_ 2>$null }

          $tag = Get-Date -Format "yyyyMMddHHmmss"
          git tag $tag
          git push origin $tag
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Failed to push tag $tag"
            exit 1
          }

          gh release create $tag `
            --title "$tag" `
            --notes "" `
            --repo "${{ github.repository }}" `
            "$($archive.FullName)"

          if ($LASTEXITCODE -ne 0) {
            Write-Error "Failed to create release"
            exit 1
          }

          $hash = (Get-FileHash -Algorithm SHA256 $archive.FullName).Hash.ToLower()

          $m = "bucket/tools.json"
          $c = Get-Content $m -Raw
          $c = $c -replace '"version":\s*"[^"]*"', "`"version`": `"$tag`""
          $c = $c -replace '"hash":\s*"[^"]*"', "`"hash`": `"$hash`""
          Set-Content $m $c -NoNewLine

          git config user.name "github-actions[bot]" --local
          git config user.email "github-actions[bot]@users.noreply.github.com" --local
          git add $m
          git commit -m "chore: update scoop manifest to $tag"
          git push
