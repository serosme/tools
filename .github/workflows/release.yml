on:
  push:
    tags:
      - 'v*'

name: release

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: package.json

      - run: npm ci

      - run: npm run build

      - shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          $archive = Get-ChildItem -Path packages/tools-electron/release/*.zip | Select-Object -First 1

          gh release create "$tag" `
            --title "$tag" `
            --generate-notes `
            --repo "${{ github.repository }}" `
            "$($archive.FullName)"
